# newsyslog-nexus.conf — log rotation for Vera-managed services.
#
# launchd doesn't rotate log files; without rotation, web.log grows to
# multiple GB over a few weeks. macOS ships with `newsyslog` (run hourly
# by com.apple.newsyslog.plist) which reads /etc/newsyslog.d/*.conf.
#
# Install (one-time, requires sudo):
#   sudo cp scripts/launchd/newsyslog-nexus.conf /etc/newsyslog.d/nexus.conf
#   sudo newsyslog -nv  # dry-run, prints what would be rotated
#
# Rotation policy:
#   - Daily at midnight (@T00)
#   - Keep 14 archived copies (~2 weeks of history)
#   - Compress old logs (Z flag → .gz)
#   - 644 perms, owned by shadow:staff
#
# Format: logfile_name owner:group mode count size when flags [pidfile] [sig]

/Users/shadow/Library/Logs/Nexus/web.log           shadow:staff  644  14  *  @T00  Z
/Users/shadow/Library/Logs/Nexus/arena.log         shadow:staff  644  14  *  @T00  Z
/Users/shadow/Library/Logs/Nexus/ollama-check.log  shadow:staff  644  14  *  @T00  Z
